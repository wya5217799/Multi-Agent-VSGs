# Navigation Manifest - Single Source of Truth for AGENTS.md "Start Here"
#
# This file is the ONLY place where "Start Here" entries are defined.
# AGENTS.md must match this list exactly (validated by test_nav_manifest.py).
# MEMORY.md must NOT maintain a parallel entry list.
#
# Rules:
#   - path: repo-relative file path (must exist)
#   - purpose: one-line description of WHY an agent reads this first
#   - trigger: what kind of change should prompt re-evaluating this entry
#
# When to update this file:
#   - A new contract/reference replaces an existing entry
#   - A structural refactor changes where agents should start
#   - An entry's file is deleted or its role changes
#
# When NOT to update:
#   - Routine code changes within an existing file
#   - Adding new scenarios that don't change the entry flow

[[start_here]]
path = "engine/harness_reference.py"
purpose = "Authoritative harness state; read before any agent action"
trigger = "harness architecture change"

[[start_here]]
path = "scenarios/contract.py"
purpose = "ScenarioContract; single source of truth for scenario constants"
trigger = "scenario parameter schema change"

[[start_here]]
path = "docs/harness/2026-04-05-simulink-harness-v1.md"
purpose = "Task contracts; defines harness task I/O and sequencing"
trigger = "harness task definition change"

[[start_here]]
